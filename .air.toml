# air config for the docker dev hot-reload loop (Dockerfile.dev).
# Watches the bind-mounted repo, rebuilds ./cmd/api, restarts the server.
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api ./cmd/api"
  bin = "./tmp/api"
  include_ext = ["go"]
  exclude_dir = ["tmp", "bin", "docs", "migrations", "api", ".git", ".github", "scripts"]
  exclude_regex = ["_test\\.go$"]
  delay = 300
  stop_on_error = true
  send_interrupt = true
  kill_delay = "2s"

[log]
  time = true

[misc]
  clean_on_exit = true
